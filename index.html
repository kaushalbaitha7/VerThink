<!DOCTYPE html>
<html>

<head>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-messaging.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBM2gM2d24Fp3wH9v0sb0a_UChuz1KvFR8",
authDomain: "verthink-kkb.firebaseapp.com",
projectId: "verthink-kkb",
storageBucket: "verthink-kkb.firebasestorage.app",
messagingSenderId: "732567518586",
appId: "1:732567518586:web:2d9612aa832fa1491b6ac3"
};

const app = initializeApp(firebaseConfig);

/* Firestore */
const db = getFirestore(app);

/* Messaging */
const messaging = getMessaging(app);


/* Enable Notification */

window.enableNotification = async function(){

const permission = await Notification.requestPermission();

if(permission === "granted"){

const token = await getToken(messaging,{
vapidKey:"BDYr5fX-tLnNtx-7KMBI3GtLl8Hj_gsnoiDO3JXBZf_3fOHgbZFnVhX5W4S-t-IhzfNUyAe9zqyYhOX7t4ctUDU"
});

console.log("TOKEN:",token);

alert("Notifications Enabled 🔔");

}

};


/* Receive notification */

onMessage(messaging,(payload)=>{

new Notification(payload.notification.title,{
body:payload.notification.body,
icon:"/icon-192.png"
});

});


/* Load Daily Content from Firestore */

async function loadDailyContent(){

const docRef = doc(db,"dailyContent","today");

const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const data = docSnap.data();

document.getElementById("dailyWord").textContent = data.word;
document.getElementById("dailyMeaning").textContent = data.meaning;

document.getElementById("dailyThought").textContent = data.thought;
document.getElementById("dailyAuthor").textContent = "— " + data.author;

}

}

loadDailyContent();

</script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141e30">
<link rel="icon" href="icon-192.png">

<title>VerThink</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="logo.png">

</head>

<body>

<div class="background-animation"></div>

<h1 class="title">VerThink</h1>


<!-- INSTALL BUTTON -->
<div class="action-bar">

<button id="notifyBtn" onclick="enableNotification()">🔔</button>

<button id="installBtn" class="install-btn">
Install App
</button>

</div>


<!-- DAILY CARDS -->

<div class="daily-container">

<div class="daily-card">

<span class="date" id="dailyDate"></span>

<span class="share-icon" onclick="shareWord()">🔗</span>

<p class="daily-word" id="dailyWord"></p>

<p class="daily-meaning" id="dailyMeaning"></p>

</div>


<div class="daily-card">

<span class="date" id="dailyDate2"></span>

<span class="share-icon" onclick="shareQuote()">🔗</span>

<p class="daily-quote" id="dailyThought"></p>

<p class="author" id="dailyAuthor"></p>

</div>

</div>


<!-- GENERATOR BUTTONS -->

<div class="container">

<div class="card">

<h2>Word of the Day</h2>

<button onclick="generateWord()">New Word</button>

</div>

<div class="card">

<h2>Thought of the Day</h2>

<button onclick="generateThought()">New Thought</button>

</div>

</div>


<!-- POPUP -->

<div id="popup" class="popup">

<div class="popup-card">

<h1 id="popupWord"></h1>

<p id="popupMeaning"></p>

<button onclick="closePopup()">Close</button>

</div>

</div>


<!-- SCRIPT -->

<script src="script.js"></script>


<!-- FOOTER -->

<footer class="footer">

</footer>

</body>

</html>
