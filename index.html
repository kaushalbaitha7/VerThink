<!DOCTYPE html>
<html>

<head>

<title>VerThink</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#141e30">

<link rel="icon" href="icon-192.png">

</head>

<body>

<div class="background-animation"></div>

<h1 class="title">VerThink</h1>


<div class="editorial-container">

  <div class="editorial-card">

    <div class="editorial-header">
      <span class="editorial-title">📘 Daily Editorial</span>
      <span class="editorial-date" id="editorialDate"></span>
    </div>

    
    <p id="editorialContent" class="editorial-text"></p>

   
    <button id="readToggle" onclick="toggleEditorial()" style="display:none;">
      Read More
    </button>

  </div>

</div>

<!-- DAILY CARDS -->

<div class="daily-container">

<div class="daily-card">

<span class="date" id="dailyDate"></span>

<span class="share-icon" onclick="shareWord()">🔗</span>
<span class="download-icon" onclick="downloadWord()">⬇️</span>

<p class="daily-word" id="dailyWord">Loading...</p>

<p class="daily-meaning" id="dailyMeaning"></p>

</div>


<div class="daily-card">

<span class="date" id="dailyDate2"></span>

<span class="share-icon" onclick="shareQuote()">🔗</span>
<span class="download-icon" onclick="downloadQuote()">⬇️</span>

<p class="daily-quote" id="dailyThought">Loading...</p>

<p class="author" id="dailyAuthor"></p>

</div>

</div>



<!-- RANDOM GENERATOR -->

<div class="container">

<div class="card">

<h2>Word Generator</h2>

<button onclick="generateWord()">New Word</button>

</div>

<div class="card">

<h2>Thought Generator</h2>

<button onclick="generateThought()">New Thought</button>

</div>

</div>


<!-- POPUP -->

<div id="popup" class="popup">

<div class="popup-card">

<h1 id="popupWord"></h1>

<p id="popupMeaning"></p>

<button onclick="closePopup()">Close</button>

</div>

</div>


<footer class="footer">
© 2026 EETIRP Ltd. | All Rights Reserved
</footer>


<!-- SHARE CANVAS -->

<canvas id="shareCanvas" width="800" height="420" style="display:none;"></canvas>


<!-- FLOATING ACTION BAR -->

<div class="action-bar">

<button id="notifyBtn" onclick="enableNotification()">🔔</button>

<button id="installBtn" class="install-btn">📲</button>

</div>


<!-- MAIN SCRIPT -->

<script type="module" src="script.js"></script>

</body>
</html>
