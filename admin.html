<!DOCTYPE html>
<html>

<head>

<title>VerThink Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="admin.css">

<script type="module" src="admin.js"></script>

</head>

<body>

<h1 class="title">VerThink Teacher Panel</h1>

<!-- LOGIN CARD -->

<div class="login-card">

<h2>Teacher Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<!-- ADMIN PANEL -->

<div class="admin-panel" style="display:none;">

<h2>Update Daily Word</h2>

<input id="word" placeholder="Word">

<input id="meaning" placeholder="Meaning">

<textarea id="thought" placeholder="Quote"></textarea>

<input id="author" placeholder="Author">

<button onclick="updateWord()">Update</button>

</div>

</body>

</html>
