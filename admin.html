<!DOCTYPE html>
<html>

<head>

<title>VerThink Admin Panel</title>
<button id="logoutBtn" onclick="logout()">Logout</button>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="admin.css">

<script type="module" src="admin.js"></script>

</head>

<body>

<h1 class="title">VerThink Teacher Panel</h1>

<!-- LOGIN CARD -->

<div class="login-card">

<h2>Teacher Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<!-- ADMIN PANEL -->

<div class="admin-panel" style="display:none;">

<h2>Update Daily Word</h2>

<input id="word" placeholder="Word">

<input id="meaning" placeholder="Meaning">

<textarea id="thought" placeholder="Quote"></textarea>

<input id="author" placeholder="Author">

<button onclick="updateWord()">Update</button>

</div>

<!-- EDITORIAL UPDATE -->

<div class="admin-panel" style="display:none;" id="editorialPanel">

<h2>Update Editorial / Notice</h2>

<textarea id="editorialContent" placeholder="Paste article / notice here..."></textarea>

<input id="editorialDate" placeholder="Date (e.g. 24 April 2026)">

<button onclick="updateEditorial()">Publish Editorial</button>

</div>

<footer class="footer">
© 2026 EETIRP Ltd. | All Rights Reserved
</footer>

</body>

</html>
